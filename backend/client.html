<!doctype html>
<html>
  <body>
    <h2>WebSocket + HTTP Test</h2>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io('http://localhost:8080', {
        query: { userId: '9c016f28-2ce9-4fad-aa8c-c278ba751660' },
      });

      socket.on('connect', () => {
        console.log('✅ Connected:', socket.id);
        triggerPrompt();
      });

      socket.on('prompt-complete', (data) => {
        console.log('🔥 Update received via WebSocket:', data);
      });

      async function triggerPrompt() {
        const payload = {
          text: 'Lo-fi hip hop beat with rain',
          style: 'lo-fi',
          duration: '60s',
        };

        try {
          const res = await fetch('http://localhost:8080/prompts', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              authorization:
                'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI5YzAxNmYyOC0yY2U5LTRmYWQtYWE4Yy1jMjc4YmE3NTE2NjAiLCJlbWFpbCI6InByYW5hYkBnbWFpbC5jb20iLCJpYXQiOjE3NzU5OTgxNDEsImV4cCI6MTc3NTk5OTA0MX0.NQ-y3ke4SLfXdLJq3uxaJpUNkgdeFEYpoRRV3_F3Iq4',
            },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          console.log('📩 HTTP Response:', data);
        } catch (err) {
          console.error('❌ Error calling /prompts:', err);
        }
      }
    </script>
  </body>
</html>
