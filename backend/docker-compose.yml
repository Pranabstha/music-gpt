version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: music_gpt_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: music_gpt        
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: music_gpt_redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music_gpt_api
    restart: always
    ports:
      - '8080:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/music_gpt 
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: music_gpt_worker
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/music_gpt 
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: